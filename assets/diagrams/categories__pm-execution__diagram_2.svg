<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 254.726 556.5" width="254.726" height="556.5" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="__High_Power__High_Interest" data-label="긴밀관리[&quot;긴밀 관리 (High Power + High Interest)&quot;]">
  <rect x="40" y="40" width="174.726" height="161.8" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="174.726" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">긴밀관리[&quot;긴밀 관리 (High Power + High Interest)&quot;]</text>
</g>
<g class="subgraph" data-id="__High_Power__Low_Interest" data-label="만족유지[&quot;만족 유지 (High Power + Low Interest)&quot;]">
  <rect x="40" y="229.8" width="150.273" height="96.9" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="229.8" width="150.273" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="243.8" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">만족유지[&quot;만족 유지 (High Power + Low Interest)&quot;]</text>
</g>
<g class="subgraph" data-id="__Low_Power__High_Interest" data-label="정보제공[&quot;정보 제공 (Low Power + High Interest)&quot;]">
  <rect x="40" y="354.70000000000005" width="146.56799999999998" height="161.8" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="354.70000000000005" width="146.56799999999998" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="368.70000000000005" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">정보제공[&quot;정보 제공 (Low Power + High Interest)&quot;]</text>
</g>
<g class="node" data-id="A" data-label="PO (terry)" data-shape="rectangle">
  <rect x="66.92975" y="84" width="99.007" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="116.43325" y="102.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">PO (terry)</text>
</g>
<g class="node" data-id="B" data-label="베타 테스터 5명" data-shape="rectangle">
  <rect x="66.92975" y="148.9" width="142.726" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="138.29275" y="167.35000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">베타 테스터 5명</text>
</g>
<g class="node" data-id="C" data-label="시드 투자자" data-shape="rectangle">
  <rect x="66.92975" y="273.8" width="118.273" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="126.06625" y="292.25" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">시드 투자자</text>
</g>
<g class="node" data-id="D" data-label="Waitlist 47명" data-shape="rectangle">
  <rect x="66.92975" y="398.70000000000005" width="114.568" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="124.21375" y="417.15000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Waitlist 47명</text>
</g>
<g class="node" data-id="E" data-label="파트너 A사" data-shape="rectangle">
  <rect x="66.92975" y="463.6" width="112.345" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="123.10225" y="482.05" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">파트너 A사</text>
</g>
</svg>