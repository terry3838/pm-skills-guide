<polyline class="edge" data-from="F" data-to="G" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="152.118,501.4 152.118,549.4" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="G" data-to="H" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="152.118,586.3 152.118,634.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
